version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: coordinator-postgres
    environment:
      POSTGRES_DB: coordinator
      POSTGRES_USER: coordinator_user
      POSTGRES_PASSWORD: secure_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coordinator_user -d coordinator"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - coordinator-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: coordinator-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - coordinator-network

  # Coordinator Server
  coordinator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coordinator-server
    environment:
      # Database Configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: coordinator
      DB_USER: coordinator_user
      DB_PASSWORD: secure_password
      DB_POOL_SIZE: 20
      
      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_POOL_SIZE: 10
      
      # Server Configuration
      SERVER_CLIENT_PORT: 8080
      SERVER_STORAGE_PORT: 8081
      SERVER_NOTIFICATION_PORT: 8082
      
      # Session Configuration
      SESSION_TTL_SECONDS: 86400
      
      # Ticket Configuration
      UPLOAD_TICKET_TTL_SECONDS: 1800
      DOWNLOAD_TICKET_TTL_SECONDS: 900
      
      # Upload Configuration
      UPLOAD_CHUNK_SIZE: 524288
      
      # Storage Node Configuration
      STORAGE_NODE_HEARTBEAT_INTERVAL: 30
      STORAGE_NODE_TIMEOUT: 90
      STORAGE_NODE_SECRET: change-this-secret-in-production
    ports:
      - "8080:8080"  # Client connections
      - "8081:8081"  # Storage node connections
      - "8082:8082"  # Notification service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - coordinator-network
    volumes:
      - ./logs:/app/logs

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  coordinator-network:
    driver: bridge
