# Storage Node Configuration for Docker
node.port=9001
node.host=0.0.0.0
node.id=storage-node-1
node.advertised.host=storage-node-1
node.advertised.port=9001
node.storage.address=storage-node-1:9001

# Storage directories
storage.data.dir=/app/data/store
storage.temp.dir=/app/data/temp
storage.meta.dir=/app/data/meta

# Antivirus scan-on-upload
antivirus.enabled=true
antivirus.host=clamd-storage-node-1
antivirus.port=3310
antivirus.timeout.ms=30000
antivirus.quarantine.dir=/app/data/quarantine
antivirus.fail.closed=true

# Chunk settings
chunk.size=524288

# Coordinator connection
# Port 8000: Client socket server (for end-user clients)
# Port 8081: Storage node control plane (for storage node communication)
coordinator.host=coordinator
coordinator.port=8081

# Security
ticket.secret=test-secret-12345
rsa.keysize=2048
aes.keysize=256

# Session settings
session.upload.timeout.minutes=60
session.download.timeout.minutes=30

# Thread pool
server.thread.pool.size=50

# Logging
log.level=INFO
log.dir=/app/logs
