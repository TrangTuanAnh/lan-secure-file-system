LogTime yes
Foreground yes
# Unix socket that the clamav image + clamdscan healthcheck expect
LocalSocket /run/clamav/clamd.sock
TCPSocket 3310
TCPAddr 0.0.0.0
MaxThreads 12
MaxFileSize 100M
MaxScanSize 400M
StreamMaxLength 100M
AlertExceedsMax yes
ConcurrentDatabaseReload no
DatabaseDirectory /var/lib/clamav
