# Storage Node Configuration
node.port=9001
node.host=0.0.0.0
node.id=node-1
node.advertised.host=127.0.0.1
node.advertised.port=9001
node.storage.address=127.0.0.1:9001

# Storage directories
storage.data.dir=data/store
storage.temp.dir=data/temp
storage.meta.dir=data/meta

# Antivirus scan-on-upload
antivirus.enabled=true
antivirus.host=127.0.0.1
antivirus.port=3310
antivirus.timeout.ms=30000
antivirus.quarantine.dir=data/quarantine
antivirus.fail.closed=true

# Chunk settings
chunk.size=524288

# Coordinator connection
# Port 8000: Client socket server (for end-user clients)
# Port 8081: Storage node control plane (for storage node communication)
coordinator.host=127.0.0.1
coordinator.port=8081

# Security
ticket.secret=CHANGE_ME_shared_secret_with_coordinator
rsa.keysize=2048
aes.keysize=256

# Session settings
session.upload.timeout.minutes=60
session.download.timeout.minutes=30

# Thread pool
server.thread.pool.size=50

# Logging
log.level=INFO
log.dir=logs
